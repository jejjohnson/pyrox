site_name: pyrox
site_description: Probabilistic modeling with Equinox and NumPyro — Bayesian neural networks, Gaussian processes, and composable GP building blocks.
site_author: J. Emmanuel Johnson
repo_url: https://github.com/jejjohnson/pyrox
repo_name: jejjohnson/pyrox

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/reference.md
      - Core: api/core.md
      - GP: api/gp.md
      - NN:
          - Overview: api/nn.md
          - Geo encoders: api/nn/geo_encoders.md
          - Conditioning: api/nn/conditioning.md
      - Inference: api/inference.md
      - Preprocessing: api/preprocessing.md
      - Estimator: api/api.md
  - Examples:
      - Exact GP Regression: notebooks/exact_gp_regression.ipynb
      - Latent GP Classification: notebooks/latent_gp_classification.ipynb
      - "Regression Masterclass — Pattern 1 (eqx.tree_at)": notebooks/regression_masterclass_treeat.ipynb
      - "Regression Masterclass — Pattern 2 (PyroxModule)": notebooks/regression_masterclass_pyrox_sample.ipynb
      - "Regression Masterclass — Pattern 3 (Parameterized)": notebooks/regression_masterclass_parameterized.ipynb
      - "Ensemble Primitives Tutorial": notebooks/ensemble_primitives_tutorial.ipynb
      - "Ensemble Runner (EnsembleMAP / EnsembleVI) Tutorial": notebooks/ensemble_runner_tutorial.ipynb
      - "Pathwise GP Posterior Sampling": notebooks/gp_pathwise.ipynb
      - "Pathwise GP × NumPyro — extended use cases": notebooks/gp_pathwise_numpyro.ipynb
      - "SIREN — Sinusoidal Implicit Neural Representations": notebooks/siren_inr.ipynb
      - "Random Fourier Features → SSGP → VSSGP — Three Spectral Views of a Gaussian Process": notebooks/random_fourier_features.ipynb
      - "Random Fourier Features as Neural Networks — Fixed, Learned, Ensemble": notebooks/rff_as_neural_networks.ipynb
      - "Deep Random Feature Expansions — Stacked Spectral GPs (Cutajar 2017)": notebooks/deep_random_fourier_features.ipynb
      - "Conditional Neural Fields — FiLM, Hypernetworks, NIF": notebooks/conditioning.ipynb
      - "Spatiotemporal Preprocessing — Geo, Time, Pandas": notebooks/spatiotemporal_preprocessing.ipynb
      - "Multi-Output Gaussian Processes — LMC, ICM, OILMM": notebooks/multioutput_gp.ipynb
  - Contributing: contributing.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3.2.2/es5/tex-mml-chtml.js
